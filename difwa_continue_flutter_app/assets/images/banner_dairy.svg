<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4" />
      <stop offset="100%" style="stop-color:#dcfce7" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="300" rx="20" fill="url(#bgGrad)"/>

  <!-- Green accent bar -->
  <rect x="0" y="0" width="8" height="300" rx="4" fill="#15803D"/>

  <!-- Sun / farm atmosphere -->
  <circle cx="680" cy="60" r="45" fill="#fef9c3" opacity="0.7"/>
  <circle cx="680" cy="60" r="35" fill="#fef08a" opacity="0.6"/>

  <!-- Rolling hills -->
  <path d="M0 220 Q200 160 400 200 Q600 240 800 180 L800 300 L0 300 Z" fill="#86efac" opacity="0.4"/>
  <path d="M0 240 Q150 200 350 230 Q550 260 800 220 L800 300 L0 300 Z" fill="#15803D" opacity="0.25"/>

  <!-- Barn / farm house -->
  <rect x="580" y="150" width="120" height="90" fill="#15803D" opacity="0.7" rx="4"/>
  <polygon points="570,150 640,100 710,150" fill="#14532D" opacity="0.8"/>
  <rect x="620" y="185" width="40" height="55" rx="4" fill="#f0fdf4" opacity="0.6"/>
  <!-- Barn door lines -->
  <line x1="640" y1="185" x2="640" y2="240" stroke="#15803D" stroke-width="2"/>

  <!-- Fence -->
  <g opacity="0.4" fill="#15803D">
    <rect x="460" y="210" width="6" height="40" rx="2"/>
    <rect x="480" y="210" width="6" height="40" rx="2"/>
    <rect x="500" y="210" width="6" height="40" rx="2"/>
    <rect x="520" y="210" width="6" height="40" rx="2"/>
    <rect x="540" y="210" width="6" height="40" rx="2"/>
    <rect x="460" y="220" width="86" height="5" rx="2"/>
    <rect x="460" y="238" width="86" height="5" rx="2"/>
  </g>

  <!-- Cow illustration -->
  <g transform="translate(320 155)">
    <ellipse cx="70" cy="65" rx="55" ry="32" fill="white" stroke="#bbf7d0" stroke-width="2"/>
    <ellipse cx="118" cy="48" rx="28" ry="22" fill="white" stroke="#bbf7d0" stroke-width="2"/>
    <ellipse cx="140" cy="56" rx="14" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <ellipse cx="103" cy="30" rx="7" ry="12" fill="white" transform="rotate(-10 103 30)" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect x="30" y="90" width="12" height="28" rx="5" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect x="50" y="90" width="12" height="28" rx="5" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect x="85" y="90" width="12" height="28" rx="5" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect x="105" y="90" width="12" height="28" rx="5" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
    <!-- Spots -->
    <ellipse cx="55" cy="56" rx="18" ry="13" fill="#dcfce7" opacity="0.7"/>
    <ellipse cx="85" cy="70" rx="12" ry="9" fill="#dcfce7" opacity="0.6"/>
    <!-- Tail -->
    <path d="M18 65 Q5 58 3 80 Q2 92 12 96" stroke="#bbf7d0" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Milk bottle small -->
  <g transform="translate(140 100) scale(0.55)">
    <rect x="70" y="20" width="50" height="28" rx="6" fill="#15803D"/>
    <path d="M70 48 L58 80 L132 80 L120 48 Z" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <path d="M53 80 L38 220 Q38 250 95 250 Q152 250 152 220 L137 80 Z" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="62" y="135" width="66" height="65" rx="8" fill="#15803D" opacity="0.8"/>
    <text x="95" y="162" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">FRESH</text>
    <text x="95" y="177" text-anchor="middle" font-family="Arial" font-size="8" fill="#86efac">MILK</text>
  </g>

  <!-- Main text -->
  <text x="50" y="85" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#14532D">Farm Fresh Milk</text>
  <text x="50" y="115" font-family="Arial, sans-serif" font-size="16" fill="#15803D">Straight from the cow. Before 7 AM.</text>

  <!-- Badge -->
  <rect x="50" y="132" width="140" height="30" rx="15" fill="#15803D"/>
  <text x="120" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">🥛 Order Now</text>
</svg>
