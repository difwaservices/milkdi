<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bgDel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532D" />
      <stop offset="100%" style="stop-color:#15803D" />
    </linearGradient>
  </defs>
  <rect width="800" height="300" rx="20" fill="url(#bgDel)"/>

  <!-- Stars/dots background -->
  <circle cx="100" cy="50" r="3" fill="white" opacity="0.15"/>
  <circle cx="250" cy="30" r="2" fill="white" opacity="0.1"/>
  <circle cx="400" cy="60" r="2.5" fill="white" opacity="0.12"/>
  <circle cx="600" cy="40" r="2" fill="white" opacity="0.1"/>
  <circle cx="720" cy="70" r="3" fill="white" opacity="0.15"/>

  <!-- Road -->
  <rect x="0" y="240" width="800" height="60" rx="0" fill="#14532D" opacity="0.5"/>
  <rect x="0" y="255" width="800" height="4" fill="white" opacity="0.1"/>
  <!-- Road dashes -->
  <rect x="50" y="265" width="60" height="4" rx="2" fill="white" opacity="0.2"/>
  <rect x="170" y="265" width="60" height="4" rx="2" fill="white" opacity="0.2"/>
  <rect x="290" y="265" width="60" height="4" rx="2" fill="white" opacity="0.2"/>
  <rect x="410" y="265" width="60" height="4" rx="2" fill="white" opacity="0.2"/>
  <rect x="530" y="265" width="60" height="4" rx="2" fill="white" opacity="0.2"/>
  <rect x="650" y="265" width="60" height="4" rx="2" fill="white" opacity="0.2"/>

  <!-- Delivery bike/rider (simplified) -->
  <g transform="translate(500 130)">
    <!-- Bike body -->
    <ellipse cx="60" cy="85" rx="32" ry="32" fill="none" stroke="#86efac" stroke-width="6"/>
    <ellipse cx="150" cy="85" rx="32" ry="32" fill="none" stroke="#86efac" stroke-width="6"/>
    <path d="M60 85 L90 50 L130 50 L150 85" stroke="#86efac" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M90 50 L95 30 L115 30 L120 50" stroke="#86efac" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Rider -->
    <circle cx="105" cy="18" r="16" fill="#86efac"/>
    <path d="M89 34 Q88 70 95 75 L115 75 Q122 70 121 34 Z" fill="#86efac"/>
    <!-- Delivery box on bike -->
    <rect x="30" y="42" width="40" height="35" rx="6" fill="#15803D" stroke="#86efac" stroke-width="2"/>
    <text x="50" y="64" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">MILK</text>
  </g>

  <!-- Milk bottles being delivered -->
  <g transform="translate(200 140) scale(0.5)">
    <rect x="70" y="20" width="45" height="25" rx="5" fill="#86efac"/>
    <path d="M70 45 L60 72 L125 72 L115 45 Z" fill="#f0fdf4"/>
    <path d="M55 72 L40 190 Q40 215 85 215 Q130 215 130 190 L115 72 Z" fill="#f0fdf4"/>
    <rect x="55" y="120" width="60" height="55" rx="7" fill="#15803D" opacity="0.8"/>
    <text x="85" y="148" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">FRESH</text>
    <text x="85" y="163" text-anchor="middle" font-family="Arial" font-size="8" fill="#86efac">MILK</text>
  </g>

  <!-- Text -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white">Delivered Before 7 AM</text>
  <text x="50" y="112" font-family="Arial, sans-serif" font-size="15" fill="#86efac">Every morning. Rain or shine. No excuses.</text>

  <!-- Time badge -->
  <rect x="50" y="135" width="165" height="36" rx="18" fill="white" opacity="0.15"/>
  <rect x="52" y="137" width="161" height="32" rx="16" fill="none" stroke="#86efac" stroke-width="1.5"/>
  <text x="133" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">⏰ 5:00 – 7:00 AM</text>

  <!-- Small icons row -->
  <text x="50" y="210" font-family="Arial, sans-serif" font-size="12" fill="#86efac">🐄 Cow Milk  •  🌿 Buffalo Milk  •  🌾 A2 Milk</text>
</svg>
