<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <defs>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0fdf4" />
      <stop offset="40%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#dcfce7" />
    </linearGradient>
    <linearGradient id="milkFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#f0fdf4" />
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a" />
      <stop offset="100%" style="stop-color:#14532D" />
    </linearGradient>
  </defs>

  <!-- Bottle cap -->
  <rect x="120" y="30" width="60" height="35" rx="8" fill="#15803D"/>
  <rect x="125" y="38" width="50" height="5" rx="2" fill="#86efac" opacity="0.5"/>

  <!-- Bottle neck -->
  <path d="M120 65 L105 110 L195 110 L180 65 Z" fill="url(#bottleGrad)" stroke="#bbf7d0" stroke-width="2"/>

  <!-- Bottle body -->
  <path d="M100 110 L80 380 Q80 420 150 420 L150 420 Q220 420 220 380 L200 110 Z"
        fill="url(#bottleGrad)" stroke="#bbf7d0" stroke-width="2.5"/>

  <!-- Milk fill -->
  <path d="M107 200 L88 375 Q88 410 150 410 Q212 410 212 375 L193 200 Z"
        fill="url(#milkFill)" opacity="0.9"/>

  <!-- Milk surface ripple -->
  <ellipse cx="150" cy="200" rx="43" ry="9" fill="white"/>
  <path d="M112 200 Q131 192 150 200 Q169 208 188 200" stroke="#86efac" stroke-width="1.5" fill="none"/>

  <!-- Green label on bottle -->
  <rect x="90" y="240" width="120" height="110" rx="12" fill="url(#labelGrad)"/>

  <!-- Cow illustration on label -->
  <g transform="translate(130 255) scale(0.45)" opacity="0.95">
    <!-- Cow body -->
    <ellipse cx="60" cy="50" rx="45" ry="28" fill="white" opacity="0.9"/>
    <!-- Cow head -->
    <ellipse cx="100" cy="35" rx="25" ry="20" fill="white" opacity="0.9"/>
    <!-- Cow snout -->
    <ellipse cx="120" cy="42" rx="12" ry="9" fill="#dcfce7" opacity="0.9"/>
    <!-- Spots -->
    <ellipse cx="45" cy="44" rx="14" ry="10" fill="#15803D" opacity="0.4"/>
    <ellipse cx="70" cy="58" rx="9" ry="7" fill="#15803D" opacity="0.35"/>
    <!-- Ear -->
    <ellipse cx="86" cy="18" rx="7" ry="12" fill="white" opacity="0.8" transform="rotate(-10 86 18)"/>
    <!-- Legs (simplified) -->
    <rect x="25" y="72" width="10" height="20" rx="4" fill="white" opacity="0.7"/>
    <rect x="42" y="72" width="10" height="20" rx="4" fill="white" opacity="0.7"/>
    <rect x="72" y="72" width="10" height="20" rx="4" fill="white" opacity="0.7"/>
    <rect x="89" y="72" width="10" height="20" rx="4" fill="white" opacity="0.7"/>
  </g>

  <!-- Label text -->
  <text x="150" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" opacity="0.95">FRESH MILK</text>
  <text x="150" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#86efac">Farm to Doorstep</text>

  <!-- Bottle bottom -->
  <ellipse cx="150" cy="418" rx="68" ry="14" fill="#dcfce7" stroke="#bbf7d0" stroke-width="2"/>

  <!-- Shine on bottle -->
  <path d="M108 130 Q110 250 106 360" stroke="rgba(255,255,255,0.65)" stroke-width="6" stroke-linecap="round"/>

  <!-- Decorative drops -->
  <circle cx="60" cy="200" r="8" fill="#86efac" opacity="0.5"/>
  <circle cx="240" cy="180" r="6" fill="#86efac" opacity="0.4"/>
  <circle cx="55" cy="320" r="5" fill="#15803D" opacity="0.2"/>
</svg>
