<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bgCow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7" />
      <stop offset="100%" style="stop-color:#bbf7d0" />
    </linearGradient>
  </defs>
  <rect width="800" height="300" rx="20" fill="url(#bgCow)"/>

  <!-- Grass -->
  <path d="M0 230 Q100 200 200 220 Q300 240 400 215 Q500 195 600 225 Q700 245 800 210 L800 300 L0 300Z" fill="#86efac" opacity="0.5"/>
  <path d="M0 255 Q150 235 300 255 Q450 272 600 248 Q700 235 800 255 L800 300 L0 300Z" fill="#15803D" opacity="0.2"/>

  <!-- Large cow -->
  <g transform="translate(420 80)">
    <!-- Body -->
    <ellipse cx="130" cy="130" rx="110" ry="65" fill="white" stroke="#bbf7d0" stroke-width="3"/>
    <!-- Head -->
    <ellipse cx="238" cy="100" rx="52" ry="44" fill="white" stroke="#bbf7d0" stroke-width="3"/>
    <!-- Snout -->
    <ellipse cx="282" cy="112" rx="26" ry="18" fill="#f9fafb" stroke="#bbf7d0" stroke-width="2"/>
    <!-- Nostrils -->
    <circle cx="274" cy="114" r="5" fill="#e2e8f0"/>
    <circle cx="290" cy="114" r="5" fill="#e2e8f0"/>
    <!-- Eyes -->
    <circle cx="246" cy="90" r="7" fill="#0f172a"/>
    <circle cx="248" cy="88" r="2.5" fill="white"/>
    <!-- Ear -->
    <ellipse cx="196" cy="64" rx="12" ry="22" fill="white" stroke="#bbf7d0" stroke-width="2" transform="rotate(-20 196 64)"/>
    <ellipse cx="196" cy="64" rx="7" ry="14" fill="#fce7f3" transform="rotate(-20 196 64)"/>
    <!-- Horn -->
    <path d="M206 66 Q195 38 210 24" stroke="#d4a017" stroke-width="7" stroke-linecap="round" fill="none"/>
    <!-- Legs -->
    <rect x="46" y="188" width="22" height="60" rx="9" fill="white" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="80" y="188" width="22" height="60" rx="9" fill="white" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="168" y="188" width="22" height="60" rx="9" fill="white" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="202" y="188" width="22" height="60" rx="9" fill="white" stroke="#bbf7d0" stroke-width="2"/>
    <!-- Hoof shading -->
    <rect x="46" y="235" width="22" height="13" rx="5" fill="#d1fae5"/>
    <rect x="80" y="235" width="22" height="13" rx="5" fill="#d1fae5"/>
    <rect x="168" y="235" width="22" height="13" rx="5" fill="#d1fae5"/>
    <rect x="202" y="235" width="22" height="13" rx="5" fill="#d1fae5"/>
    <!-- Tail -->
    <path d="M24 130 Q2 118 0 152 Q-2 170 12 176" stroke="#bbf7d0" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Udder -->
    <ellipse cx="120" cy="192" rx="44" ry="22" fill="#fce7f3" stroke="#fbcfe8" stroke-width="1.5"/>
    <!-- Spots -->
    <ellipse cx="90" cy="110" rx="36" ry="26" fill="#dcfce7" opacity="0.65"/>
    <ellipse cx="165" cy="140" rx="22" ry="18" fill="#dcfce7" opacity="0.55"/>
    <ellipse cx="60" cy="145" rx="16" ry="12" fill="#dcfce7" opacity="0.5"/>
  </g>

  <!-- Text -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#14532D">Verified Dairy Farms</text>
  <text x="50" y="112" font-family="Arial, sans-serif" font-size="15" fill="#15803D">We pick only the best — checked, not just listed.</text>

  <!-- Stars -->
  <text x="50" y="155" font-family="Arial, sans-serif" font-size="22" fill="#fbbf24">★★★★★</text>
  <text x="50" y="180" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Trusted by 50,000+ happy customers</text>

  <!-- Badge -->
  <rect x="50" y="195" width="160" height="30" rx="15" fill="#15803D"/>
  <text x="130" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">🐄 200+ Dairies</text>
</svg>
