<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bgSub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5" />
      <stop offset="100%" style="stop-color:#d1fae5" />
    </linearGradient>
  </defs>
  <rect width="800" height="300" rx="20" fill="url(#bgSub)"/>

  <!-- Calendar grid decoration -->
  <g opacity="0.12" transform="translate(520 50)">
    <rect width="220" height="200" rx="12" fill="#15803D"/>
    <rect x="10" y="10" width="200" height="30" rx="6" fill="white"/>
    <rect x="10" y="50" width="40" height="40" rx="6" fill="white"/>
    <rect x="60" y="50" width="40" height="40" rx="6" fill="white"/>
    <rect x="110" y="50" width="40" height="40" rx="6" fill="white"/>
    <rect x="160" y="50" width="40" height="40" rx="6" fill="white"/>
    <rect x="10" y="100" width="40" height="40" rx="6" fill="white"/>
    <rect x="60" y="100" width="40" height="40" rx="6" fill="white"/>
    <rect x="110" y="100" width="40" height="40" rx="6" fill="#15803D" opacity="0.7"/>
    <rect x="160" y="100" width="40" height="40" rx="6" fill="white"/>
    <rect x="10" y="150" width="40" height="40" rx="6" fill="white"/>
    <rect x="60" y="150" width="40" height="40" rx="6" fill="white"/>
    <rect x="110" y="150" width="40" height="40" rx="6" fill="white"/>
    <rect x="160" y="150" width="40" height="40" rx="6" fill="white"/>
  </g>

  <!-- Stacked milk bottles -->
  <g transform="translate(540 60) scale(0.38)">
    <!-- Bottle 1 -->
    <rect x="20" y="20" width="45" height="25" rx="5" fill="#15803D"/>
    <path d="M20 45 L10 72 L75 72 L65 45 Z" fill="#f0fdf4"/>
    <path d="M5 72 L-10 195 Q-10 220 38 220 Q86 220 86 195 L71 72 Z" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="5" y="125" width="62" height="55" rx="7" fill="#15803D"/>
    <text x="36" y="153" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">DAILY</text>
    <text x="36" y="166" text-anchor="middle" font-family="Arial" font-size="8" fill="#86efac">MILK</text>
    <!-- Bottle 2 -->
    <rect x="100" y="20" width="45" height="25" rx="5" fill="#15803D"/>
    <path d="M100 45 L90 72 L155 72 L145 45 Z" fill="#f0fdf4"/>
    <path d="M85 72 L70 195 Q70 220 118 220 Q166 220 166 195 L151 72 Z" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="85" y="125" width="62" height="55" rx="7" fill="#14532D"/>
    <text x="116" y="153" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">FRESH</text>
    <text x="116" y="166" text-anchor="middle" font-family="Arial" font-size="8" fill="#86efac">MILK</text>
  </g>

  <!-- Text -->
  <text x="50" y="85" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#14532D">Subscribe &amp; Save</text>
  <text x="50" y="118" font-family="Arial, sans-serif" font-size="15" fill="#15803D">Daily, alternate-day, or weekly — your call.</text>
  <text x="50" y="143" font-family="Arial, sans-serif" font-size="14" fill="#15803D">Pause anytime. No questions asked.</text>

  <!-- Plan chips -->
  <rect x="50" y="165" width="80" height="28" rx="14" fill="#15803D"/>
  <text x="90" y="184" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Daily</text>
  <rect x="142" y="165" width="100" height="28" rx="14" fill="#15803D" opacity="0.6"/>
  <text x="192" y="184" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Alternate</text>
  <rect x="254" y="165" width="82" height="28" rx="14" fill="#15803D" opacity="0.4"/>
  <text x="295" y="184" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Weekly</text>

  <!-- Savings badge -->
  <rect x="50" y="210" width="135" height="30" rx="15" fill="#14532D"/>
  <text x="117" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">💰 Save up to 15%</text>
</svg>
